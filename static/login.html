<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Store — Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #8b5cf6;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root.light-mode {
            --bg-dark: #f8fafc;
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(99, 102, 241, 0.2);
            --text-main: #0f172a;
            --text-muted: #475569;
        }
        :root.light-mode .bg-gradient {
            background: radial-gradient(circle at 0% 0%, #e0e7ff 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, #c7d2fe 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, #f1f5f9 0%, #e2e8f0 100%);
        }
        :root.light-mode input {
            background: rgba(255, 255, 255, 0.9);
            color: #0f172a;
            border: 1px solid var(--glass-border);
        }
        :root.light-mode .tabs {
            background: rgba(0, 0, 0, 0.05);
        }
        :root.light-mode .btn-social {
            background: rgba(0, 0, 0, 0.02);
            color: #0f172a;
        }

        html {
            font-size: 16px;
            background: #020617;
        }
        :root.light-mode html {
            background: #cbd5e1;
        }

        .theme-toggle-login {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            color: var(--text-main);
            padding: clamp(1rem, 4vw, 2.5rem) 0;
        }

        /* Animated abstract background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, #312e81 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        }

        .orb {
            position: absolute;
            width: clamp(200px, 40vw, 500px);
            height: clamp(200px, 40vw, 500px);
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            animation: move 20s infinite alternate ease-in-out;
        }

        .orb-1 { background: var(--primary); top: -100px; left: -100px; }
        .orb-2 { background: var(--accent); bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(10%, 10%) scale(1.1); }
        }

        .login-container {
            width: 100%;
            max-width: clamp(320px, 90vw, 460px);
            padding: clamp(0.75rem, 3vw, 2rem);
            position: relative;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: clamp(16px, 3vw, 24px);
            padding: clamp(1.25rem, 4vw, 2.5rem);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .brand {
            text-align: center;
            margin-bottom: clamp(1.5rem, 4vw, 2.5rem);
        }

        .brand-icon {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 0.5rem;
            display: inline-block;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        .brand-name {
            font-size: clamp(1.25rem, 4vw, 1.75rem);
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-tagline {
            color: var(--text-muted);
            font-size: clamp(0.75rem, 2vw, 0.875rem);
            margin-top: 0.25rem;
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: clamp(3px, 0.5vw, 5px);
            border-radius: clamp(8px, 1.5vw, 12px);
            margin-bottom: clamp(1.25rem, 3vw, 2rem);
        }

        .tab-btn {
            flex: 1;
            padding: clamp(0.4rem, 1.2vw, 0.625rem);
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: clamp(0.78rem, 2vw, 0.875rem);
            cursor: pointer;
            border-radius: clamp(6px, 1vw, 8px);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .form-group {
            margin-bottom: clamp(0.875rem, 2.5vw, 1.25rem);
        }

        label {
            display: block;
            margin-bottom: clamp(0.3rem, 1vw, 0.5rem);
            font-size: clamp(0.75rem, 2vw, 0.875rem);
            font-weight: 500;
            color: var(--text-muted);
        }

        .input-wrapper {
            position: relative;
        }

        .btn-toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1.1rem;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-toggle-password:hover {
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: clamp(0.6rem, 1.8vw, 0.875rem) clamp(0.75rem, 2vw, 1rem);
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: clamp(8px, 1.5vw, 12px);
            color: white;
            outline: none;
            transition: all 0.2s;
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 44px;
        }

        input::placeholder {
            color: var(--text-muted);
            font-size: clamp(0.8rem, 2vw, 0.9rem);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 clamp(2px, 0.4vw, 4px) rgba(99, 102, 241, 0.1);
        }

        .btn {
            width: 100%;
            padding: clamp(0.6rem, 1.8vw, 0.875rem);
            border: none;
            border-radius: clamp(8px, 1.5vw, 12px);
            font-weight: 700;
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 44px;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            margin-top: clamp(1rem, 3vw, 1.5rem);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: clamp(1.25rem, 3vw, 2rem) 0;
            color: var(--text-muted);
            font-size: clamp(0.65rem, 1.8vw, 0.75rem);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .divider span { padding: 0 clamp(0.5rem, 2vw, 1rem); }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(0.5rem, 2vw, 1rem);
        }

        .btn-social {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            font-weight: 600;
            font-size: clamp(0.78rem, 2vw, 0.875rem);
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-social img, .btn-social svg {
            width: clamp(14px, 2.5vw, 18px);
            height: clamp(14px, 2.5vw, 18px);
        }

        #register-form { display: none; }

        .toast-container {
            position: fixed;
            bottom: clamp(0.75rem, 3vw, 2rem);
            right: clamp(0.75rem, 3vw, 2rem);
            z-index: 1000;
            max-width: calc(100vw - 2rem);
        }

        .toast {
            background: #1e293b;
            color: white;
            padding: clamp(0.75rem, 2vw, 1rem) clamp(1rem, 2.5vw, 1.5rem);
            border-radius: clamp(8px, 1.5vw, 12px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-top: 0.5rem;
            border-left: 4px solid var(--primary);
            animation: slideIn 0.3s ease-out;
            max-width: clamp(240px, 70vw, 300px);
            font-size: clamp(0.78rem, 2vw, 0.9rem);
            word-break: break-word;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ============================================
           LOGIN — Responsive Breakpoints
           ============================================ */

        /* ---------- Extra-Large Desktop (1440px+) ---------- */
        @media (min-width: 1440px) {
            html { font-size: 17px; }

            .login-container {
                max-width: 500px;
            }

            .glass-card {
                padding: 3rem;
                border-radius: 28px;
            }

            .brand-icon { font-size: 3.5rem; }
            .brand-name { font-size: 2rem; }
            .brand-tagline { font-size: 1rem; }

            input {
                padding: 1rem 1.25rem;
                font-size: 1.05rem;
            }

            .btn {
                padding: 1rem;
                font-size: 1.05rem;
            }

            .tab-btn {
                padding: 0.7rem;
                font-size: 0.95rem;
            }
        }

        /* ---------- Large Desktop (1200px – 1439px) ---------- */
        @media (min-width: 1200px) and (max-width: 1439px) {
            html { font-size: 16px; }

            .login-container {
                max-width: 460px;
            }

            .glass-card {
                padding: 2.5rem;
            }
        }

        /* ---------- Tablet Landscape (1024px – 1199px) ---------- */
        @media (min-width: 1024px) and (max-width: 1199px) {
            html { font-size: 15.5px; }

            .login-container {
                max-width: 440px;
            }

            .glass-card {
                padding: 2.25rem;
            }
        }

        /* ---------- Tablet Portrait (768px – 1023px) ---------- */
        @media (min-width: 768px) and (max-width: 1023px) {
            html { font-size: 15px; }

            .login-container {
                max-width: 420px;
                padding: 1.5rem;
            }

            .glass-card {
                padding: 2rem;
            }

            .brand-icon { font-size: 2.5rem; }
            .brand-name { font-size: 1.5rem; }

            .orb {
                width: 350px;
                height: 350px;
                filter: blur(90px);
            }
        }

        /* ---------- Large Mobile (481px – 767px) ---------- */
        @media (min-width: 481px) and (max-width: 767px) {
            html { font-size: 14.5px; }

            .login-container {
                max-width: 400px;
                padding: 1.25rem;
            }

            .glass-card {
                padding: 1.75rem;
                border-radius: 20px;
            }

            .brand {
                margin-bottom: 1.75rem;
            }

            .brand-icon { font-size: 2.25rem; }
            .brand-name { font-size: 1.4rem; }
            .brand-tagline { font-size: 0.8rem; }

            .tabs {
                margin-bottom: 1.5rem;
            }

            input {
                padding: 0.7rem 0.9rem;
            }

            .divider {
                margin: 1.5rem 0;
            }

            .orb {
                width: 280px;
                height: 280px;
                filter: blur(80px);
                opacity: 0.12;
            }
        }

        /* ---------- Mobile (361px – 480px) ---------- */
        @media (max-width: 480px) {
            html { font-size: 14px; }

            .login-container {
                max-width: 100%;
                padding: 0.75rem;
            }

            .glass-card {
                padding: 1.5rem;
                border-radius: 18px;
            }

            .brand {
                margin-bottom: 1.5rem;
            }

            .brand-icon { font-size: 2rem; }
            .brand-name { font-size: 1.3rem; }
            .brand-tagline { font-size: 0.78rem; }

            .tabs {
                margin-bottom: 1.25rem;
            }

            .tab-btn {
                padding: 0.4rem;
                font-size: 0.8rem;
            }

            .form-group {
                margin-bottom: 0.875rem;
            }

            label {
                font-size: 0.78rem;
                margin-bottom: 0.3rem;
            }

            input {
                padding: 0.65rem 0.8rem;
                font-size: 16px; /* Prevent iOS zoom */
                border-radius: 10px;
            }

            .btn {
                font-size: 0.9rem;
                border-radius: 10px;
            }

            .btn-primary {
                margin-top: 1rem;
            }

            .divider {
                margin: 1.25rem 0;
                font-size: 0.68rem;
            }

            .social-grid {
                gap: 0.625rem;
            }

            .btn-social {
                font-size: 0.78rem;
            }

            .toast-container {
                left: 0.5rem;
                right: 0.5rem;
                bottom: 0.5rem;
            }

            .toast {
                max-width: 100%;
                font-size: 0.8rem;
            }

            .orb {
                width: 200px;
                height: 200px;
                filter: blur(70px);
                opacity: 0.1;
            }
        }

        /* ---------- Extra-Small Mobile (max 360px) ---------- */
        @media (max-width: 360px) {
            html { font-size: 13px; }

            .login-container {
                padding: 0.5rem;
            }

            .glass-card {
                padding: 1.25rem;
                border-radius: 14px;
            }

            .brand {
                margin-bottom: 1.25rem;
            }

            .brand-icon { font-size: 1.75rem; }
            .brand-name { font-size: 1.15rem; }
            .brand-tagline { font-size: 0.72rem; }

            .tabs {
                margin-bottom: 1rem;
            }

            .tab-btn {
                padding: 0.35rem;
                font-size: 0.75rem;
            }

            .form-group {
                margin-bottom: 0.75rem;
            }

            label {
                font-size: 0.72rem;
                margin-bottom: 0.25rem;
            }

            input {
                padding: 0.55rem 0.7rem;
                font-size: 16px; /* Prevent iOS zoom */
                border-radius: 8px;
                min-height: 40px;
            }

            .btn {
                padding: 0.55rem;
                font-size: 0.85rem;
                border-radius: 8px;
                min-height: 40px;
            }

            .btn-primary {
                margin-top: 0.75rem;
            }

            .divider {
                margin: 1rem 0;
                font-size: 0.62rem;
            }

            .social-grid {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }

            .btn-social {
                font-size: 0.75rem;
            }

            .btn-social img, .btn-social svg {
                width: 14px;
                height: 14px;
            }

            .orb {
                width: 150px;
                height: 150px;
                filter: blur(60px);
                opacity: 0.08;
            }

            .orb-2 { display: none; }
        }

        /* ---------- Landscape Phone Fix ---------- */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 0.5rem 0;
                align-items: flex-start;
            }

            .glass-card {
                padding: 1rem 1.5rem;
            }

            .brand {
                margin-bottom: 0.75rem;
            }

            .brand-icon { font-size: 1.5rem; }
            .brand-name { font-size: 1.1rem; }
            .brand-tagline { font-size: 0.72rem; }

            .tabs { margin-bottom: 0.75rem; }

            .form-group { margin-bottom: 0.5rem; }

            label { margin-bottom: 0.2rem; }

            input { padding: 0.5rem 0.75rem; }

            .btn-primary { margin-top: 0.5rem; }

            .divider { margin: 0.75rem 0; }

            .login-container {
                max-width: 500px;
            }
        }

        /* ---------- Touch Device Enhancements ---------- */
        @media (hover: none) and (pointer: coarse) {
            .btn:hover, .btn:active, .btn-primary:active, .tab-btn:active, input:focus, .glass-card:hover {
                transform: none !important;
            }
            .btn:hover {
                box-shadow: none;
            }
            .btn-primary:active {
                background: var(--primary-dark);
            }
            .btn-social:active {
                background: rgba(255, 255, 255, 0.1);
            }
            input, .btn, .tab-btn {
                min-height: 44px;
            }
        }

        /* ---------- High-DPI / Retina Screens ---------- */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .glass-card {
                border: 0.5px solid var(--glass-border);
            }

            .orb {
                filter: blur(120px);
            }
        }

        /* ---------- Print ---------- */
        @media print {
            .bg-gradient, .orb, .toast-container { display: none !important; }
            body { background: white; color: black; }
            .glass-card { background: white; border: 1px solid #ccc; box-shadow: none; }
            .brand-name { -webkit-text-fill-color: black; }
        }
    </style>
</head>
<body>
    <button id="theme-toggle" class="theme-toggle-login">☀️</button>
    <div class="bg-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-container">
        <div class="glass-card">
            <div class="brand">
                <span class="brand-icon">🏪</span>
                <h1 class="brand-name">Smart Store</h1>
                <p class="brand-tagline">Manage your kiryana store inventory</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" onclick="switchTab('register')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="login-password" required style="padding-right: 40px;">
                        <button type="button" class="btn-toggle-password" onclick="togglePassword('login-password', this)">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="btn-login">
                    <span>Sign In</span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password (Min. 8 chars)</label>
                    <div class="input-wrapper">
                        <input type="password" id="reg-password" required style="padding-right: 40px;">
                        <button type="button" class="btn-toggle-password" onclick="togglePassword('reg-password', this)">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="btn-register">
                    <span>Create Account</span>
                </button>
            </form>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <div class="social-grid">
                <button class="btn btn-social" onclick="window.location.href = '/auth/google/login'">
                    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.64 9.204c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
                        <path d="M3.964 10.71a5.41 5.41 0 010-3.42V4.958H.957a8.993 8.993 0 000 8.084l3.007-2.332z" fill="#FBBC05"/>
                        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.484 0 2.443 2.017.957 4.958L3.964 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/>
                    </svg>
                    <span>Google</span>
                </button>
                <button class="btn btn-social" onclick="handleSocial('github')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                    </svg>
                    <span>GitHub</span>
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        const API = window.location.origin;

        // Theme Setup
        const savedTheme = localStorage.getItem('smartstore_theme');
        const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        if (savedTheme === 'light' || (!savedTheme && prefersLight)) {
            document.documentElement.classList.add('light-mode');
            document.getElementById('theme-toggle').textContent = '🌙';
        }

        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
                if (!localStorage.getItem('smartstore_theme')) {
                    if (e.matches) {
                        document.documentElement.classList.add('light-mode');
                        document.getElementById('theme-toggle').textContent = '🌙';
                    } else {
                        document.documentElement.classList.remove('light-mode');
                        document.getElementById('theme-toggle').textContent = '☀️';
                    }
                }
            });
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isLight = document.documentElement.classList.toggle('light-mode');
            localStorage.setItem('smartstore_theme', isLight ? 'light' : 'dark');
            document.getElementById('theme-toggle').textContent = isLight ? '🌙' : '☀️';
        });

        // Auto-redirect if already logged in
        document.addEventListener('DOMContentLoaded', async () => {
            if (localStorage.getItem('smartstore_user')) {
                window.location.href = '/dashboard';
            }
        });

        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const btns = document.querySelectorAll('.tab-btn');
            
            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');

            btn.disabled = true;
            btn.innerHTML = '<span>Signing in...</span>';

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    showToast('👋 Welcome back!', 'success');
                    localStorage.setItem('smartstore_user', JSON.stringify(data.user));
                    localStorage.setItem('smartstore_last_activity', Date.now().toString());
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    showToast(data.message || 'Login failed', 'error');
                }
            } catch (err) {
                showToast('Server connection failed', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Sign In</span>';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const btn = document.getElementById('btn-register');

            btn.disabled = true;
            btn.innerHTML = '<span>Creating account...</span>';

            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (data.success) {
                    showToast('🎉 Account created!', 'success');
                    localStorage.setItem('smartstore_user', JSON.stringify(data.user));
                    localStorage.setItem('smartstore_last_activity', Date.now().toString());
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    showToast(data.message || 'Registration failed', 'error');
                }
            } catch (err) {
                showToast('Server connection failed', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Create Account</span>';
            }
        }

        async function handleSocial(provider) {
            // Get email from the existing input field instead of causing a pop-up
            const emailField = document.getElementById('login-email');
            const email = emailField.value.trim();

            if (!email || !email.includes('@')) {
                showToast(`Please enter a valid email address first.`, 'error');
                emailField.focus();
                return;
            }

            const name = email.split('@')[0].replace('.', ' ');
            
            showToast(`Authenticating with ${provider}...`, 'info');

            try {
                const res = await fetch(`${API}/auth/social`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ 
                        name: name.charAt(0).toUpperCase() + name.slice(1), 
                        email, 
                        provider,
                        provider_id: `social_${Math.random().toString(36).substr(2, 9)}`
                    })
                });
                const data = await res.json();

                if (data.success) {
                    showToast(`✅ Signed in as ${data.user.name}`, 'success');
                    localStorage.setItem('smartstore_user', JSON.stringify(data.user));
                    localStorage.setItem('smartstore_last_activity', Date.now().toString());
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    showToast(data.message || 'Social login failed', 'error');
                }
            } catch (err) {
                showToast('Server connection failed', 'error');
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('login-form').onsubmit = handleLogin;
        document.getElementById('register-form').onsubmit = handleRegister;
    </script>
</body>
</html>
