<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Store — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0e1a;
            --card: rgba(17, 24, 39, 0.8);
            --border: rgba(99, 102, 241, 0.15);
            --border-glow: rgba(99, 102, 241, 0.3);
            --text: #f1f5f9;
            --text-sec: #94a3b8;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --danger: #ef4444;
            --radius: 16px;
            --radius-sm: 10px;
            --font: 'Inter', -apple-system, sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Background orbs */
        .orb { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; animation: float 20s ease-in-out infinite; }
        .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -100px; }
        .orb-2 { width: 400px; height: 400px; background: var(--success); bottom: -100px; left: -80px; animation-delay: -7s; }
        .orb-3 { width: 300px; height: 300px; background: #f59e0b; top: 60%; left: 50%; animation-delay: -14s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Login container */
        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: var(--card);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 36px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo-icon {
            font-size: 3rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 16px var(--accent-glow));
        }
        .login-logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .login-logo-sub {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 24px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .auth-tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        /* Form */
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-sec);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s ease;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .form-group input::placeholder { color: var(--text-muted); }

        .btn-submit {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent), #818cf8);
            color: white;
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 16px var(--accent-glow);
            margin-top: 4px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px var(--accent-glow);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 22px 0;
            color: var(--text-muted);
            font-size: 0.78rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Social buttons */
        .social-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-social {
            width: 100%;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-social:hover {
            border-color: var(--border-glow);
            background: rgba(30, 41, 59, 0.7);
            transform: translateY(-1px);
        }
        .btn-social svg {
            width: 20px;
            height: 20px;
        }
        .btn-google:hover { border-color: rgba(234, 67, 53, 0.4); }
        .btn-github:hover { border-color: rgba(255, 255, 255, 0.3); }

        /* Error message */
        .auth-error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .auth-error.show { display: block; animation: shake 0.4s ease; }

        .auth-success {
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: var(--success);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
        }
        .auth-success.show { display: block; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .password-rules {
            display: flex;
            flex-direction: column;
            gap: 3px;
            margin-top: 6px;
        }
        .password-rules .rule {
            font-size: 0.73rem;
            color: var(--danger);
            transition: 0.2s ease;
        }
        .password-rules .rule.pass {
            color: var(--success);
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">🏪</div>
                <div class="login-logo-text">Smart Store</div>
                <div class="login-logo-sub">Manage your kiryana store inventory</div>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Sign Up</button>
            </div>

            <div class="auth-error" id="auth-error"></div>
            <div class="auth-success" id="auth-success"></div>

            <!-- Login Form -->
            <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)" autocomplete="off">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-submit" id="btn-login">Sign In</button>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="form-register" onsubmit="handleRegister(event)" autocomplete="off">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="Ali Khan" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password *</label>
                    <input type="password" id="reg-password" placeholder="••••••••" minlength="8" required autocomplete="new-password" oninput="checkPasswordStrength()">
                    <div class="password-rules" id="password-rules">
                        <span class="rule" id="rule-length">✕ At least 8 characters</span>
                        <span class="rule" id="rule-upper">✕ One uppercase letter</span>
                        <span class="rule" id="rule-lower">✕ One lowercase letter</span>
                        <span class="rule" id="rule-number">✕ One number</span>
                        <span class="rule" id="rule-special">✕ One special symbol (!@#$%...)</span>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="btn-register">Create Account</button>
            </form>

            <div class="divider">or continue with</div>

            <div class="social-btns">
                <button class="btn-social btn-google" onclick="loginWithGoogle()" type="button">
                    <svg viewBox="0 0 24 24"><path fill="#EA4335" d="M5.27 9.76A7.08 7.08 0 0 1 12 5.04c1.69 0 3.21.59 4.41 1.56l3.3-3.3A11.96 11.96 0 0 0 12 0 12 12 0 0 0 1.24 6.65l4.03 3.11Z"/><path fill="#34A853" d="M16.04 18.01A7.4 7.4 0 0 1 12 19.08a7.08 7.08 0 0 1-6.73-4.84L1.24 17.35A12 12 0 0 0 12 24c3.04 0 5.8-1.14 7.9-3l-3.86-2.99Z"/><path fill="#4A90D9" d="M19.9 21c2.55-2.37 4.1-5.93 4.1-9.83 0-.82-.1-1.7-.29-2.52H12v4.94h6.72a5.8 5.8 0 0 1-2.68 3.42L19.9 21Z"/><path fill="#FBBC05" d="M5.27 14.24A7.15 7.15 0 0 1 4.92 12c0-.79.13-1.55.35-2.24L1.24 6.65A12 12 0 0 0 0 12c0 1.94.46 3.77 1.24 5.35l4.03-3.11Z"/></svg>
                    Continue with Google
                </button>
                <button class="btn-social btn-github" onclick="loginWithGitHub()" type="button">
                    <svg viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.17c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.21.08 1.85 1.24 1.85 1.24 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6.02 0c2.3-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.93.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.82.58A12.01 12.01 0 0 0 24 12c0-6.63-5.37-12-12-12Z"/></svg>
                    Continue with GitHub
                </button>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;

        // Check if already logged in
        (async function checkAuth() {
            const user = localStorage.getItem("smartstore_user");
            if (user) {
                window.location.href = "/dashboard";
            }
        })();

        function switchTab(tab) {
            document.getElementById("tab-login").classList.toggle("active", tab === "login");
            document.getElementById("tab-register").classList.toggle("active", tab === "register");
            document.getElementById("form-login").classList.toggle("active", tab === "login");
            document.getElementById("form-register").classList.toggle("active", tab === "register");
            hideMessages();
        }

        function showError(msg) {
            const el = document.getElementById("auth-error");
            el.textContent = msg;
            el.className = "auth-error show";
            document.getElementById("auth-success").className = "auth-success";
        }

        function showSuccess(msg) {
            const el = document.getElementById("auth-success");
            el.textContent = msg;
            el.className = "auth-success show";
            document.getElementById("auth-error").className = "auth-error";
        }

        function hideMessages() {
            document.getElementById("auth-error").className = "auth-error";
            document.getElementById("auth-success").className = "auth-success";
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideMessages();
            const btn = document.getElementById("btn-login");
            btn.disabled = true;
            btn.textContent = "Signing in...";

            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({
                        email: document.getElementById("login-email").value.trim(),
                        password: document.getElementById("login-password").value,
                    }),
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem("smartstore_user", JSON.stringify(data.user));
                    showSuccess("Login successful! Redirecting...");
                    setTimeout(() => window.location.href = "/dashboard", 500);
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Connection failed. Is the server running?");
            }
            btn.disabled = false;
            btn.textContent = "Sign In";
        }

        async function handleRegister(e) {
            e.preventDefault();
            hideMessages();
            const btn = document.getElementById("btn-register");

            if (!checkPasswordStrength()) {
                showError("Password must have 8+ chars, uppercase, lowercase, number, and special symbol.");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Creating account...";

            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({
                        name: document.getElementById("reg-name").value.trim(),
                        email: document.getElementById("reg-email").value.trim(),
                        password: document.getElementById("reg-password").value,
                    }),
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem("smartstore_user", JSON.stringify(data.user));
                    showSuccess("Account created! Redirecting...");
                    setTimeout(() => window.location.href = "/dashboard", 500);
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Connection failed. Is the server running?");
            }
            btn.disabled = false;
            btn.textContent = "Create Account";
        }

        function loginWithGoogle() {
            // For demo: prompt for email
            const email = prompt("Enter your Google email:");
            if (!email) return;
            const name = email.split("@")[0];
            socialLogin(name, email, "google");
        }

        function loginWithGitHub() {
            const email = prompt("Enter your GitHub email:");
            if (!email) return;
            const name = email.split("@")[0];
            socialLogin(name, email, "github");
        }

        async function socialLogin(name, email, provider) {
            try {
                const res = await fetch(`${API}/auth/social`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ name, email, provider }),
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem("smartstore_user", JSON.stringify(data.user));
                    showSuccess("Login successful! Redirecting...");
                    setTimeout(() => window.location.href = "/dashboard", 500);
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError("Connection failed.");
            }
        }

        function checkPasswordStrength() {
            const pw = document.getElementById("reg-password").value;
            const rules = [
                { id: "rule-length", test: pw.length >= 8, label: "At least 8 characters" },
                { id: "rule-upper", test: /[A-Z]/.test(pw), label: "One uppercase letter" },
                { id: "rule-lower", test: /[a-z]/.test(pw), label: "One lowercase letter" },
                { id: "rule-number", test: /[0-9]/.test(pw), label: "One number" },
                { id: "rule-special", test: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?~`]/.test(pw), label: "One special symbol (!@#$%...)" },
            ];
            rules.forEach(r => {
                const el = document.getElementById(r.id);
                el.className = r.test ? "rule pass" : "rule";
                el.textContent = (r.test ? "✓ " : "✕ ") + r.label;
            });
            return rules.every(r => r.test);
        }
    </script>
</body>
</html>
